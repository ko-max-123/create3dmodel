# KV: 本番では wrangler kv namespace create CHALLENGES で id を発行して差し替えてください。
# ローカルは npm run dev（--local）で KV をシミュレートします。
name = "rot3d-cha-api"
main = "src/index.ts"
compatibility_date = "2026-01-01"

[[kv_namespaces]]
binding = "CHALLENGES"
id = "00000000000000000000000000000001"

[vars]
ALLOWED_ORIGIN = "https://YOUR_USERNAME.github.io,http://127.0.0.1:5500,http://localhost:5500"
